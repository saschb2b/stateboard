name: Pages

# A read-only static demo: landing + docs + the example board, deployed
# to GitHub Pages. The editor and all DB-backed routes can't run on
# Pages (no Node server, no SQLite, no filesystem) — so the prebuild
# step strips them and replaces /boards with a stub that points
# visitors at the example or self-hosting.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  # Pages only ever has one current deploy; serialize.
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: build static demo
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build static demo
        env:
          PAGES_BUILD: "1"
          STATEBOARD_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    name: deploy to Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
