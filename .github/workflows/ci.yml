name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref so a fast-follow push doesn't
# pile up CI minutes for code nobody will look at again.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  app:
    name: typecheck · lint · format · build
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      # The runtime is pure-JS (pg + better-auth) — no native build step.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Build
        run: pnpm build

  helm:
    name: helm lint · server-side dry run
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.16.4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.31.0

      - name: helm dependency build
        run: helm dependency build deploy/helm/stateboard

      - name: helm lint
        run: |
          helm lint deploy/helm/stateboard \
            --set auth.secret=ci-test-secret-do-not-use \
            --set auth.keycloak.issuer=https://keycloak.example/realms/test \
            --set auth.keycloak.clientSecret=ci-test \
            --set postgresql.auth.password=ci-test

      - name: helm template | kubectl --dry-run=client
        run: |
          helm template stateboard deploy/helm/stateboard \
            --set auth.secret=ci-test-secret-do-not-use \
            --set auth.keycloak.issuer=https://keycloak.example/realms/test \
            --set auth.keycloak.clientSecret=ci-test \
            --set postgresql.auth.password=ci-test \
            | kubectl apply --dry-run=client -f -

      # Multi-replica must render without error in v1 (Postgres handles
      # concurrency). This used to be a "must fail" check in v0.
      - name: Confirm replicaCount=2 renders
        run: |
          helm template stateboard deploy/helm/stateboard \
            --set replicaCount=2 \
            --set persistence.accessMode=ReadWriteMany \
            --set auth.secret=ci-test-secret-do-not-use \
            --set auth.keycloak.issuer=https://keycloak.example/realms/test \
            --set auth.keycloak.clientSecret=ci-test \
            --set postgresql.auth.password=ci-test \
            > /dev/null

      # The chart must fail closed if auth.secret is missing — sessions
      # without a secret would be insecure, so this is intentional.
      - name: Confirm missing auth.secret fails
        run: |
          if helm template stateboard deploy/helm/stateboard > /dev/null 2>&1; then
            echo "::error::Chart rendered without auth.secret — the safety guard is broken."
            exit 1
          fi
          echo "OK: chart correctly refused empty auth.secret."
