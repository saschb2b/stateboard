{{- /*
Generated Secret with the Better Auth + Keycloak env vars. Skipped when
the user provides their own via auth.existingSecret.

We don't auto-generate the BETTER_AUTH_SECRET because regenerating it
on every helm upgrade would invalidate every active session. If
auth.secret is left blank, the chart fails fast with a clear message
rather than ship something insecure.
*/ -}}
{{- if not .Values.auth.existingSecret -}}
{{- if not .Values.auth.secret -}}
{{- fail "auth.secret is required (use `openssl rand -base64 32`) — or set auth.existingSecret to point at a pre-created Secret." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "stateboard.authSecretName" . }}
  labels:
    {{- include "stateboard.labels" . | nindent 4 }}
type: Opaque
stringData:
  BETTER_AUTH_SECRET: {{ .Values.auth.secret | quote }}
  STATEBOARD_BASE_URL: {{ .Values.auth.baseUrl | quote }}
  KEYCLOAK_ISSUER: {{ .Values.auth.keycloak.issuer | quote }}
  KEYCLOAK_CLIENT_ID: {{ .Values.auth.keycloak.clientId | quote }}
  KEYCLOAK_CLIENT_SECRET: {{ .Values.auth.keycloak.clientSecret | quote }}
  STATEBOARD_ALLOWED_EMAIL_DOMAINS: {{ .Values.auth.allowedEmailDomains | quote }}
  STATEBOARD_DEFAULT_ROLE: {{ .Values.auth.defaultRole | quote }}
{{- end -}}
