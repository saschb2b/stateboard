# Default values for the StateBoard Helm chart (v1).
#
# v1 = multi-user, OIDC via Keycloak, Postgres-backed. The chart can run
# with the bundled Bitnami Postgres sub-chart (default) or against an
# external Postgres by flipping postgresql.enabled to false and setting
# externalDatabaseUrl.

image:
  repository: ghcr.io/saschb2b/stateboard
  tag: "" # defaults to .Chart.AppVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []

# Replicas. Postgres handles concurrent connections fine, so this can
# safely scale > 1. The only caveat is the uploads PVC: if replicaCount
# > 1, persistence.accessMode must be ReadWriteMany or you must move
# uploads to S3-compatible storage (planned for v2).
replicaCount: 1

# Uploaded screenshots live on a PersistentVolume. Postgres data lives
# in the bundled sub-chart's PVC, not here.
persistence:
  enabled: true
  existingClaim: ""
  size: 10Gi
  storageClass: "" # "" = cluster default
  # Use ReadWriteMany when running multiple replicas. ReadWriteOnce is
  # fine for replicaCount=1 (the default).
  accessMode: ReadWriteOnce
  mountPath: /data

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: ""
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
    # nginx.ingress.kubernetes.io/proxy-body-size: 30m
  hosts:
    - host: stateboard.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: stateboard-tls
    #   hosts:
    #     - stateboard.example.com

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 768Mi

# RollingUpdate is safe in v1 (Postgres handles concurrency). v0's
# `Recreate` was a SQLite workaround; that constraint is gone.
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false # Next.js standalone needs writable .next/cache
  capabilities:
    drop: [ALL]

probes:
  enabled: true
  liveness:
    initialDelaySeconds: 20
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# ---- Auth (Keycloak / OIDC) ------------------------------------------------
# Required for sign-in to work. Provide either inline values OR point at
# a pre-created Secret via auth.existingSecret.
auth:
  # Public URL the app reaches itself at. Must match Keycloak's
  # "Valid redirect URIs" (StateBoard registers /api/auth/callback/keycloak).
  baseUrl: "https://stateboard.example.com"
  # Random string used to sign session cookies. Generate with:
  #   openssl rand -base64 32
  secret: ""
  keycloak:
    # Realm URL — e.g. https://keycloak.example.com/realms/acme
    issuer: ""
    clientId: "stateboard"
    clientSecret: ""
  # Comma-separated email-domain allowlist. Empty = any signed-in
  # Keycloak user (subject to whatever the realm enforces).
  allowedEmailDomains: ""
  # Default role for newly-signed-in users (after the first user, who
  # always becomes owner). One of: owner | editor | viewer
  defaultRole: "editor"
  # If set, all auth values above are ignored — read from this Secret
  # instead. Keys: BETTER_AUTH_SECRET, KEYCLOAK_ISSUER, KEYCLOAK_CLIENT_ID,
  # KEYCLOAK_CLIENT_SECRET, STATEBOARD_BASE_URL, STATEBOARD_ALLOWED_EMAIL_DOMAINS,
  # STATEBOARD_DEFAULT_ROLE.
  existingSecret: ""

# ---- Database --------------------------------------------------------------
# Either use the bundled Postgres (default) or point at an external one.
postgresql:
  enabled: true
  auth:
    username: stateboard
    password: "change-me"
    database: stateboard
  primary:
    persistence:
      enabled: true
      size: 10Gi

# When postgresql.enabled is false, set this to a Postgres connection
# string (postgres://user:pass@host:5432/dbname). May reference an
# existingSecret key — see externalDatabaseUrlExistingSecret.
externalDatabaseUrl: ""

# Optional: read DATABASE_URL from a Secret instead of inline.
# Set both name + key. Takes precedence over externalDatabaseUrl.
externalDatabaseUrlExistingSecret:
  name: ""
  key: "DATABASE_URL"

# ---- Migration job ---------------------------------------------------------
# Runs `pnpm migrate` (node scripts/migrate.mjs) as a Helm pre-install +
# pre-upgrade hook. Disable if you'd rather run migrations out-of-band.
migrate:
  enabled: true
  backoffLimit: 3
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 256Mi }

# Extra env vars injected verbatim into the container.
extraEnv: []
extraEnvFrom: []
extraContainers: []
initContainers: []

serviceAccount:
  create: true
  name: ""
  annotations: {}

podAnnotations: {}
podLabels: {}
commonLabels: {}
commonAnnotations: {}

nameOverride: ""
fullnameOverride: ""
