apiVersion: v2
name: stateboard
description: Status reporting for visual products. Show, don't tell.
type: application
# v1 introduces multi-user (Keycloak/OIDC) and Postgres. The chart bundles
# a Bitnami Postgres sub-chart by default; set postgresql.enabled=false to
# point at an external server via externalDatabaseUrl.
version: 1.0.0
appVersion: "1.0.0"
home: https://github.com/saschb2b/stateboard
sources:
  - https://github.com/saschb2b/stateboard
keywords:
  - status-reporting
  - product-management
  - screenshots
  - annotations
  - oidc
  - keycloak
maintainers:
  - name: StateBoard maintainers
    url: https://github.com/saschb2b/stateboard
annotations:
  category: Productivity
dependencies:
  - name: postgresql
    version: "16.4.5"
    repository: "https://charts.bitnami.com/bitnami"
    condition: postgresql.enabled
